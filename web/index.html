<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO y descripción -->
    <meta name="description" content="Gamification app for AQUATECHinn 4.0 – Learn sustainability through interactive quizzes." />

    <!-- Color del tema (barra superior móvil) -->
    <meta name="theme-color" content="#77B4EB" />

    <!-- Íconos -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="manifest" href="manifest.json" />

    <!-- Base path: en servidores reales usa la raíz -->
    <base href="/" />

    <title>AQUATECHinn Quiz</title>

    <!-- Flutter Web bootstrap (carga todo el motor) -->
    <script src="flutter_bootstrap.js" defer></script>

    <!-- Para despliegue HTTPS: mejora caché y recursos -->
    <meta http-equiv="Cache-Control" content="max-age=31536000, must-revalidate" />
  </head>

  <body>
    <!-- Opcional: spinner de carga hasta que arranque Flutter -->
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: white;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #loading {
        color: #77B4EB;
        font-size: 1.2rem;
      }
    </style>
    <div id="loading">Loading AQUATECHinn...</div>

    <script>
      window.addEventListener('flutter-first-frame', function () {
        document.getElementById('loading')?.remove();
      });
    </script>
  </body>
</html>
